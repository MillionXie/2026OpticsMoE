# Single-task OpticalMoE experiment config.
# All nested fields are expanded intentionally so training parameters are easy to edit.
# readout.dropout is electronic dropout. regularization.phase_dropout is optical phase-layer dropout.
seed: 7
device: auto
experiment:
  family: single_task
  dataset: mnist
  model_type: learnable_route_moe
  run_name: mnist_learnable_moe_E9_complex
dataset:
  name: mnist
  root: ./data
  input_size: 134
  grayscale: true
  val_split: 0.1
  batch_size: 64
  num_workers: 0
  download: true
  smoke_test: false
  smoke_train_size: 64
  smoke_test_size: 32
  sampling_protocol:
    enabled: false
    total_size: null
    train_test_ratio:
    - 4
    - 1
model:
  type: learnable_route_moe
  num_experts: 9
  prompt_type: complex_amplitude
  routing_type: learnable
  input_size: 134
  canvas_size: 1000
  expert_size: 134
  expert_pitch: 200
  padding: 200
  prompt_aperture_size: 600
  num_layers: 5
optics:
  wavelength_m: 5.32e-07
  pixel_size_m: 8.0e-06
  focal_length_m: 0.1
  aperture_mode: hard
  evanescent_mode: zero
  phase_param: unconstrained
  expert_phase_init: identity
  expert_init_std: 0.02
  global_fc_phase_init: identity
  global_fc_init_std: 0.02
  distances_m:
    input_to_prompt: 0.2
    prompt_to_expert: 0.2
    inter_layer: 0.05
    layer5_to_fc: 0.05
    fc_to_detector: 0.05
prompt:
  mode: complex_order_router
  amplitude_init_logits: 2.0
  train_amplitudes: true
  train_phase_biases: true
  grating_scale: 1.0
  grating_sign_x: 1.0
  grating_sign_y: 1.0
  normalize: sum_amplitude
detector:
  detector_size: 32
  layout: grid
# 读出头设置：这里控制探测器能量之后是否接电子层。
# 如果想尽量“去掉电”，把下面改为：
#   type: optical_only
#   input_norm: none
#   dropout: 0.0
# optical_only 不含可训练电子层；hidden_dim/hidden_layers/activation 会被忽略。
# 注意 detector energy 的求和和 logit_scale 仍然属于读出定义，不是 MLP 非线性。
readout:
  # 可选：mlp / linear / optical_only。
  type: mlp
  normalize_detector_energy: true
  logit_scale: 10.0
  input_norm: layernorm
  norm_affine: true
  hidden_dim: 64
  hidden_layers: 1
  activation: gelu
  dropout: 0.1
regularization:
  phase_dropout:
    enabled: true
    mode: block_phase_bypass
    expert_p: 0.05
    global_fc_p: 0.0
    block_size: 8
    batch_shared: true
    apply_to_experts: true
    apply_to_global_fc: false
    start_epoch: 10
optimizer:
  type: adamw
  lr: 0.001
  weight_decay: 0.0005
training:
  epochs: 200
  print_freq: 50
  save_interval_epochs: 10
  eval_interval_epochs: 1
  max_val_batches: null
visualization:
  enabled: true
  save_interval_epochs: 10
  num_samples: 4
  save_light_fields: true
  save_prompt_maps: true
  save_phase_masks: true
  save_detector_outputs: true

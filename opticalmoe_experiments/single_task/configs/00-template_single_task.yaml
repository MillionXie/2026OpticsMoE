# Single-task OpticalMoE 通用配置模板。
# 这个文件主要用于“看懂有哪些参数可以调”，正式运行可以复制一份再改。
# readout.dropout 是电子读出层 dropout；regularization.phase_dropout 是光学相位层 dropout。

seed: 7  # 随机种子。固定后，数据划分和初始化更可复现。
device: auto  # auto = 有 CUDA 就用 CUDA；也可以写 cpu 或 cuda。

experiment:
  family: single_task
  dataset: mnist
  model_type: learnable_route_moe
  run_name: mnist_learnable_moe_E9_complex

dataset:
  # 支持：mnist / fashionmnist / kmnist / emnist / cifar10。
  name: mnist

  # 数据集根目录。注意：从 opticalmoe_experiments/ 运行时，./data 指向 opticalmoe_experiments/data。
  # 如果想复用旧 opticalmoe/data，可以改成 ../opticalmoe/data。
  root: ./data

  # 光学输入尺寸。fair134 MoE 默认用 134x134。
  input_size: 134

  # CIFAR10 默认也转成单通道灰度，以匹配光学振幅输入。
  grayscale: true

  # 从训练集里划一部分做 validation。
  # 例如 MNIST 60000 张，val_split=0.1 后约 54000 train + 6000 val。
  val_split: 0.1

  # 每个 batch 的样本数。batch_size 越大，显存越高，但每个 epoch 的 step 数更少。
  batch_size: 64

  # DataLoader 后台进程数。
  # Windows/调试时建议 0，最稳定；Linux 服务器可尝试 2/4/8 提高数据加载速度。
  num_workers: 0

  # true 时如果本地没有数据，会让 torchvision 下载。
  download: true

  # smoke_test 只用于快速检查代码是否能跑，不用于正式实验。
  smoke_test: false
  smoke_train_size: 64
  smoke_test_size: 32

  sampling_protocol:
    # false = 使用完整训练/测试集。
    # true = 只抽取 total_size 张，适合小样本、公平采样或控制训练时间。
    enabled: false

    # enabled=true 时生效。
    # total_size 是 train_pool + test 的总抽样量，不含后续从 train_pool 切出的 val。
    # 例如 total_size=5000 且 train_test_ratio=[4,1]：
    # 先抽 4000 作为 train_pool、1000 作为 test；
    # 再从 4000 里按 val_split=0.1 划出约 400 val、3600 train。
    total_size: null

    # 训练池和测试集的抽样比例。
    train_test_ratio:
      - 4
      - 1

model:
  # 可选：
  # learnable_route_moe = 可学习 prompt amplitude / phase bias 的 MoE，本方法。
  # fixed_route_moe    = 固定 prompt，只有 expert/global FC/readout 训练。
  # general_d2nn       = 无专家、无 prompt 的一般 D2NN 参数量匹配 baseline。
  # lenet5             = 电子神经网络 baseline。
  type: learnable_route_moe

  # MoE 支持 9 或 4。默认 9 expert fair134。
  num_experts: 9
  prompt_type: complex_amplitude
  routing_type: learnable

  # fair134 输入和专家孔径大小。
  input_size: 134
  canvas_size: 1000
  expert_size: 134
  expert_pitch: 200
  padding: 200
  prompt_aperture_size: 600

  # 光学 expert 相位层数量。
  num_layers: 5

  # general_d2nn 专用。402x402x5 约等于 9x134x134x5 的 expert 相位参数量。
  d2nn_phase_grid_size: 402
  d2nn_num_layers: 5
  target_param_count: 808020

optics:
  wavelength_m: 5.32e-7
  pixel_size_m: 8.0e-6

  # z1=z2=0.20m 时 f=0.10m 对应 1:1 成像关系。
  focal_length_m: 0.10

  # hard = expert aperture 外的光被挡掉；transparent = aperture 外也透过。
  aperture_mode: hard
  evanescent_mode: zero
  phase_param: unconstrained

  # identity = 初始相位为 0；small_normal/uniform_0_2pi 可作为对照。
  expert_phase_init: identity
  expert_init_std: 0.02
  global_fc_phase_init: identity
  global_fc_init_std: 0.02

  distances_m:
    input_to_prompt: 0.20
    prompt_to_expert: 0.20
    inter_layer: 0.05
    layer5_to_fc: 0.05
    fc_to_detector: 0.05

prompt:
  # 当前成功架构：AS global-router，不是旧的空间分区 prompt。
  mode: complex_order_router

  # sigmoid(2.0) 约 0.88，表示初始每个 expert 通道基本打开。
  amplitude_init_logits: 2.0

  # learnable_route_moe 通常为 true；fixed_route_moe 应改为 false。
  train_amplitudes: true
  train_phase_biases: true

  # 光栅路由校正参数。正常先保持 1.0 / 1.0 / 1.0。
  grating_scale: 1.0
  grating_sign_x: 1.0
  grating_sign_y: 1.0
  normalize: sum_amplitude

detector:
  detector_size: 32
  layout: grid

# 读出头设置：这里控制探测器能量之后是否接电子层。
# 如果想尽量“去掉电”，把下面改为：
#   type: optical_only
#   input_norm: none
#   dropout: 0.0
# optical_only 不含可训练电子层；hidden_dim/hidden_layers/activation 会被忽略。
# 注意 detector energy 的求和和 logit_scale 仍然属于读出定义，不是 MLP 非线性。
readout:
  # 可选：mlp / linear / optical_only。
  type: mlp
  normalize_detector_energy: true
  logit_scale: 10.0
  input_norm: layernorm
  norm_affine: true
  hidden_dim: 64
  hidden_layers: 1
  activation: gelu
  dropout: 0.1

regularization:
  phase_dropout:
    # 光学相位层 dropout。训练时随机让一部分相位像素/块临时退化为 identity。
    # eval/test 自动关闭，不会永久修改相位参数。
    enabled: true
    mode: block_phase_bypass
    expert_p: 0.05
    global_fc_p: 0.0
    block_size: 8
    batch_shared: true
    apply_to_experts: true
    apply_to_global_fc: false

    # epoch >= start_epoch 才开始启用 phase dropout。
    start_epoch: 10

optimizer:
  type: adamw
  lr: 0.001
  weight_decay: 0.0005

training:
  # 一个 epoch = train_loader 里所有 batch 都跑一遍。
  # 不是“每个 batch 跑完整数据集”，而是“完整训练集被分成很多 batch”。
  epochs: 200

  # 每隔多少个 batch 打印一次训练过程。
  print_freq: 50

  # 每隔多少个 epoch 保存一次光场/prompt/phase/detector 可视化。
  save_interval_epochs: 10

  # 当前训练脚本默认每个 epoch 都做一次 validation。
  eval_interval_epochs: 1

  # null = 每次 validation 扫完整 val_loader。
  # 可以设成 50/100 来加快每个 epoch，但验证精度会更粗糙。
  max_val_batches: null

visualization:
  enabled: true
  save_interval_epochs: 10
  num_samples: 4
  save_light_fields: true
  save_prompt_maps: true
  save_phase_masks: true
  save_detector_outputs: true

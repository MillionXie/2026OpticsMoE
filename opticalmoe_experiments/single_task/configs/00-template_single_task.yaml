# 单任务配置模板：
# - dataset.sampling_protocol.enabled=false 表示使用官方完整 train/test split；
#   官方 train 再按 val_split 切出 validation。
# - dataset.sampling_protocol.enabled=true 时，total_size 是本次实验的
#   train + val + test 总样本数。例如 total_size=10000、[4,1]、
#   val_split=0.1 约等于 train=7200、val=800、test=2000。
# - max_train_samples / max_val_samples / max_test_samples 可以直接截断
#   每个 split，适合精确指定 train=5000、val=1000、test=1000。
# - num_workers 是 DataLoader 多进程数；Linux 服务器可先用 16，
#   Windows 或调试建议 0。smoke_test 会自动强制 num_workers=0。
# - pin_memory=auto 表示 CUDA 可用时自动启用 pinned memory。
# - persistent_workers=true 表示 worker 在 epoch 间保持活跃。
# - prefetch_factor=4 表示每个 worker 预取 4 个 batch。
# - readout.dropout 是电子读出层 dropout；regularization.phase_dropout
#   是 optical phase layer dropout，两者不是同一个东西。
seed: 7
device: auto
experiment:
  family: single_task
  dataset: mnist
  model_type: learnable_route_moe
  run_name: mnist_learnable_moe_E9_complex
dataset:
  name: mnist
  root: ./data
  input_size: 120
  grayscale: true
  val_split: 0.1
  batch_size: 64
  num_workers: 16
  pin_memory: auto
  persistent_workers: true
  prefetch_factor: 4
  download: true
  smoke_test: false
  smoke_train_size: 64
  smoke_test_size: 32
  sampling_protocol:
    enabled: false
    total_size: null
    train_test_ratio:
    - 4
    - 1
    class_balanced: true
    seed_offset: 0
  max_train_samples: null
  max_val_samples: null
  max_test_samples: null
model:
  type: learnable_route_moe
  num_experts: 9
  prompt_type: complex_amplitude
  routing_type: learnable
  input_size: 120
  canvas_size: 520
  expert_size: 120
  expert_pitch: 150
  padding: 35
  prompt_aperture_size: 450
  num_layers: 5
  d2nn_phase_grid_size: 360  # 360^2 = 129600, matching one fast120_520 MoE local-phase layer.
  d2nn_num_layers: 5
  target_local_phase_param_count: 648000
  target_param_count: 648000  # Backward-compatible name; local D2NN masks only.
  include_global_fc: true
  expected_global_fc_param_count: 202500
  expected_total_optical_param_count: 850500
layout:
  geometry_profile: fast120_520
  canvas_height: 520
  canvas_width: 520
  input_size: 120
  expert_size: 120
  expert_pitch: 150
  padding: 35
  prompt_aperture_size: 450

optics:
  wavelength_m: 5.32e-07
  pixel_size_m: 8.0e-06
  focal_length_m: 0.1
  aperture_mode: hard
  evanescent_mode: zero
  phase_param: unconstrained
  expert_phase_init: identity
  expert_init_std: 0.02
  global_fc_phase_init: identity
  global_fc_init_std: 0.02
  distances_m:
    input_to_prompt: 0.2
    prompt_to_expert: 0.2
    inter_layer: 0.05
    layer5_to_fc: 0.05
    fc_to_detector: 0.05
  global_fc_phase_mode: center_window
  global_fc_phase_size: 450
  global_fc_padding_mode: transparent
prompt:
  mode: complex_order_router
  amplitude_init_logits: 2.0
  train_amplitudes: true
  train_phase_biases: true
  grating_scale: 1.0
  grating_sign_x: 1.0
  grating_sign_y: 1.0
  normalize: sum_amplitude
detector:
  detector_size: 32
  layout: grid
readout:
  type: mlp
  normalize_detector_energy: true
  logit_scale: 10.0
  input_norm: layernorm
  norm_affine: true
  hidden_dim: 64
  hidden_layers: 1
  activation: gelu
  dropout: 0.1
regularization:
  phase_dropout:
    enabled: true
    mode: block_phase_bypass
    expert_p: 0.05
    global_fc_p: 0.0
    block_size: 8
    batch_shared: true
    apply_to_experts: true
    apply_to_global_fc: false
    start_epoch: 10
optimizer:
  type: adamw
  lr: 0.001
  weight_decay: 0.0005
training:
  epochs: 200
  print_freq: 50
  save_interval_epochs: 10
  eval_interval_epochs: 1
  max_val_batches: null
reporting:
  rebuild_master_tables_after_run: true
visualization:
  enabled: true
  save_interval_epochs: 10
  num_samples: 4
  save_light_fields: true
  save_prompt_maps: true
  save_phase_masks: true
  save_detector_outputs: true

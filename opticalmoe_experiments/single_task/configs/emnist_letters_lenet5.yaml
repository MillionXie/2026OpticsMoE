# Single-task OpticalMoE experiment config.
# All nested fields are expanded intentionally so training parameters are easy to edit.
# readout.dropout is electronic dropout. regularization.phase_dropout is optical phase-layer dropout.
seed: 7
device: auto
experiment:
  family: single_task
  dataset: emnist_letters
  model_type: lenet5
  run_name: emnist_letters_lenet5
dataset:
  name: emnist
  split: letters
  fix_orientation: true
  root: ./data
  input_size: 134
  grayscale: true
  val_split: 0.1
  batch_size: 64
  num_workers: 0
  download: true
  smoke_test: false
  smoke_train_size: 64
  smoke_test_size: 32
  sampling_protocol:
    enabled: false
    total_size: null
    train_test_ratio:
    - 4
    - 1
model:
  type: lenet5
  input_size: 134
readout:
  type: electronic
regularization:
  phase_dropout:
    enabled: false
    mode: none
    expert_p: 0.0
    global_fc_p: 0.0
    block_size: 8
    batch_shared: true
    apply_to_experts: false
    apply_to_global_fc: false
    start_epoch: 0
optimizer:
  type: adamw
  lr: 0.001
  weight_decay: 0.0005
training:
  epochs: 100
  print_freq: 50
  save_interval_epochs: 10
  eval_interval_epochs: 1
  max_val_batches: null
visualization:
  enabled: true
  save_interval_epochs: 10
  num_samples: 4

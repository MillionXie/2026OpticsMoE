seed: 7
device: auto
experiment:
  family: single_task
  dataset: mnist
  model_type: general_d2nn
  run_name: mnist_d2nn_matched_params
dataset:
  name: mnist
  root: ./data
  input_size: 120
  grayscale: true
  val_split: 0.1
  batch_size: 64
  num_workers: 16
  download: true
  smoke_test: false
  smoke_train_size: 64
  smoke_test_size: 32
  sampling_protocol:
    enabled: true
    total_size: 10000
    train_test_ratio:
    - 4
    - 1
    class_balanced: true
    seed_offset: 0
  pin_memory: auto
  persistent_workers: true
  prefetch_factor: 4
  max_train_samples: null
  max_val_samples: null
  max_test_samples: null
model:
  type: general_d2nn
  input_size: 120
  canvas_size: 520
  num_layers: 5
  d2nn_phase_grid_size: 360  # 360^2 = 129600, matching one fast120_520 MoE local-phase layer.
  d2nn_num_layers: 5
  target_param_count: 648000  # Backward-compatible name; local D2NN masks only.
  target_local_phase_param_count: 648000
  include_global_fc: true
  expected_global_fc_param_count: 202500
  expected_total_optical_param_count: 850500
layout:
  geometry_profile: fast120_520
  canvas_height: 520
  canvas_width: 520
  input_size: 120
  expert_size: 120
  expert_pitch: 150
  padding: 35
  prompt_aperture_size: 450

optics:
  wavelength_m: 5.32e-07
  pixel_size_m: 8.0e-06
  evanescent_mode: zero
  phase_param: unconstrained
  expert_phase_init: identity
  expert_init_std: 0.02
  distances_m:
    input_to_prompt: 0.2
    inter_layer: 0.05
    layer5_to_fc: 0.05
    fc_to_detector: 0.05
  global_fc_phase_mode: center_window
  global_fc_phase_size: 450
  global_fc_padding_mode: transparent
detector:
  detector_size: 32
  layout: grid
readout:
  type: optical_only
  normalize_detector_energy: true
  logit_scale: 10.0
  input_norm: none
  norm_affine: false
  hidden_dim: 64
  hidden_layers: 1
  activation: gelu
  dropout: 0.1
regularization:
  phase_dropout:
    enabled: true
    mode: block_phase_bypass
    expert_p: 0.05
    global_fc_p: 0.05
    block_size: 8
    batch_shared: true
    apply_to_experts: true
    apply_to_global_fc: false
    start_epoch: 10
optimizer:
  type: adamw
  lr: 0.003
  weight_decay: 0.0005
training:
  epochs: 100
  print_freq: 50
  save_interval_epochs: 10
  eval_interval_epochs: 1
  max_val_batches: null
visualization:
  enabled: true
  save_interval_epochs: 10
  num_samples: 4
  save_light_fields: true
  save_prompt_maps: true
  save_phase_masks: true
  save_detector_outputs: true

seed: 7
device: auto
experiment:
  family: same_input_multitask
  run_name: dsprites_shape_scale_independent_d2nn_seed7
  print_freq: 50
model:
  type: independent_d2nn
  note: 'Supplemental baseline: one ordinary D2NN per task, not an upper bound.'
  input_size: 120
  canvas_size: 520
  d2nn_phase_grid_size: 360  # 360^2 = 129600, matching one fast120_520 MoE local-phase layer.
  d2nn_num_layers: 5
layout:
  geometry_profile: fast120_520
  canvas_height: 520
  canvas_width: 520
  input_size: 120
  expert_size: 120
  expert_pitch: 150
  padding: 35
  prompt_aperture_size: 450

optics:
  global_fc_phase_mode: center_window
  global_fc_phase_size: 450
  global_fc_padding_mode: transparent

training:
  mode: independent_same_input_baseline
  epochs: 200
  tasks:
  - shape
  - scale
  task_heads:
    shape:
      detector_size: 32
      detector_layout: grid
      readout_type: mlp
      normalize_detector_energy: true
      logit_scale: 10.0
      input_norm: layernorm
      norm_affine: true
      hidden_dim: 64
      hidden_layers: 1
      activation: gelu
      dropout: 0.1
    scale:
      detector_size: 32
      detector_layout: grid
      readout_type: mlp
      normalize_detector_energy: true
      logit_scale: 10.0
      input_norm: layernorm
      norm_affine: true
      hidden_dim: 64
      hidden_layers: 1
      activation: gelu
      dropout: 0.1
dataset:
  name: dsprites
  root: ./data
  input_size: 120
  batch_size: 64
  num_workers: 16
  download: true
  val_split: 0.1
  test_split: 0.1
  seed: 7
  sampling_protocol:
    enabled: true
    total_size: 12000
    train_test_ratio:
    - 4
    - 1
    class_balanced: false
    seed_offset: 0
  pin_memory: auto
  persistent_workers: true
  prefetch_factor: 4
  smoke_test: false
  smoke_train_size: 64
  smoke_test_size: 32
  max_train_samples: null
  max_val_samples: null
  max_test_samples: null

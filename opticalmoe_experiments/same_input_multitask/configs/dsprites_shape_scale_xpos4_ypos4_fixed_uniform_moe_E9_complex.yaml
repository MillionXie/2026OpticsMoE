seed: 7
device: auto
experiment:
  family: same_input_multitask
  run_name: dsprites_shape_scale_xpos4_ypos4_fixed_uniform_moe_E9_complex_seed7
model:
  type: fixed_route_moe
  num_experts: 9
  prompt_type: complex_amplitude
  routing_type: fixed_uniform
layout:
  canvas_height: 1000
  canvas_width: 1000
  input_size: 134
  expert_size: 134
  expert_pitch: 200
  padding: 200
  prompt_aperture_size: 600
optics:
  wavelength_m: 5.32e-7
  pixel_size_m: 8.0e-6
  num_layers: 5
  focal_length_m: 0.10
  aperture_mode: hard
  evanescent_mode: zero
  phase_param: unconstrained
  expert_phase_init: identity
  expert_init_std: 0.02
  global_fc_phase_init: identity
  global_fc_init_std: 0.02
  distances_m:
    input_to_prompt: 0.20
    prompt_to_expert: 0.20
    inter_layer: 0.05
    layer5_to_fc: 0.05
    fc_to_detector: 0.05
prompt:
  mode: complex_order_router
  amplitude_init_logits: 2.0
  train_amplitudes: false
  train_phase_biases: false
  grating_scale: 1.0
  grating_sign_x: 1.0
  grating_sign_y: 1.0
  normalize: sum_amplitude
detector:
  detector_size: 32
  layout: grid
readout:
  type: mlp
  normalize_detector_energy: true
  logit_scale: 10.0
  input_norm: layernorm
  norm_affine: true
  hidden_dim: 64
  hidden_layers: 1
  activation: gelu
  dropout: 0.1
regularization:
  phase_dropout:
    enabled: true
    mode: block_phase_bypass
    expert_p: 0.05
    global_fc_p: 0.0
    block_size: 8
    batch_shared: true
    apply_to_experts: true
    apply_to_global_fc: false
    start_epoch: 10
optimizer:
  type: adamw
  lr: 0.001
  weight_decay: 0.0005
training:
  mode: same_input_multitask
  batch_mode: paired_same_input
  epochs: 200
  print_freq: 50
  tasks:
    - shape
    - scale
    - x_position_4bin
    - y_position_4bin
  loss_weights:
    shape: 1.0
    scale: 1.0
    x_position_4bin: 1.0
    y_position_4bin: 1.0
  evaluation:
    max_val_batches: null
    max_test_batches: null
dataset:
  name: dsprites
  root: ./data
  input_size: 134
  batch_size: 64
  num_workers: 16
  download: true
  val_split: 0.1
  test_split: 0.1
  seed: 7
  smoke_train_size: 16
  smoke_test_size: 8
  sampling_protocol:
    enabled: true
    total_size: 12000
    train_test_ratio: [4, 1]
visualization:
  enabled: true
  save_interval_epochs: 10
  num_samples: 4
  dpi: 150
reporting:
  rebuild_master_tables_after_run: true

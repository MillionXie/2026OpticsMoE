seed: 7
device: auto
experiment:
  family: same_input_multitask
  run_name: dsprites_shape_scale_learnable_moe_E9_complex_seed7
  print_freq: 50
model:
  type: learnable_route_moe
  num_experts: 9
  prompt_type: complex_amplitude
  routing_type: learnable
layout:
  geometry_profile: fast120_520
  canvas_height: 520
  canvas_width: 520
  input_size: 120
  expert_size: 120
  expert_pitch: 150
  padding: 35
  prompt_aperture_size: 450

optics:
  wavelength_m: 5.32e-07
  pixel_size_m: 8.0e-06
  num_layers: 5
  focal_length_m: 0.1
  aperture_mode: hard
  evanescent_mode: zero
  phase_param: unconstrained
  expert_phase_init: identity
  expert_init_std: 0.02
  global_fc_phase_init: identity
  global_fc_init_std: 0.02
  distances_m:
    input_to_prompt: 0.2
    prompt_to_expert: 0.2
    inter_layer: 0.05
    layer5_to_fc: 0.05
    fc_to_detector: 0.05
  global_fc_phase_mode: center_window
  global_fc_phase_size: 450
  global_fc_padding_mode: transparent
prompt:
  mode: complex_order_router
  amplitude_init_logits: 2.0
  train_amplitudes: true
  train_phase_biases: true
  grating_scale: 1.0
  grating_sign_x: 1.0
  grating_sign_y: 1.0
  normalize: sum_amplitude
detector:
  detector_size: 32
  layout: grid
readout:
  type: optical_only #mlp
  normalize_detector_energy: true
  logit_scale: 10.0
  input_norm: layernorm
  norm_affine: false #true
  hidden_dim: 64
  hidden_layers: 1
  activation: gelu
  dropout: 0.1
regularization:
  phase_dropout:
    enabled: true
    mode: block_phase_bypass
    expert_p: 0.05
    global_fc_p: 0.0
    block_size: 8
    batch_shared: true
    apply_to_experts: true
    apply_to_global_fc: true
    start_epoch: 10
optimizer:
  type: adamw
  lr: 0.003
  weight_decay: 0.0005
training:
  mode: same_input_multitask
  batch_mode: paired_same_input
  epochs: 200
  print_freq: 50
  tasks:
  - shape
  - scale
  loss_weights:
    shape: 1.0
    scale: 1.0
  evaluation:
    max_val_batches: null
    max_test_batches: null
  task_heads:
    shape:
      detector_size: 32
      detector_layout: grid
      readout_type: optical_only #mlp
      normalize_detector_energy: true
      logit_scale: 10.0
      input_norm: layernorm
      norm_affine: false #true
      hidden_dim: 64
      hidden_layers: 1
      activation: gelu
      dropout: 0.1
    scale:
      detector_size: 32
      detector_layout: grid
      readout_type: optical_only #mlp
      normalize_detector_energy: true
      logit_scale: 10.0
      input_norm: layernorm
      norm_affine: false #true
      hidden_dim: 64
      hidden_layers: 1
      activation: gelu
      dropout: 0.1
dataset:
  name: dsprites
  root: ./data
  input_size: 120
  batch_size: 64
  num_workers: 6
  download: true
  val_split: 0.1
  test_split: 0.1
  seed: 7
  smoke_train_size: 64
  smoke_test_size: 32
  sampling_protocol:
    enabled: true
    total_size: 12000
    train_test_ratio:
    - 4
    - 1
    class_balanced: false
    seed_offset: 0
  pin_memory: auto
  persistent_workers: true
  prefetch_factor: 4
  smoke_test: false
  max_train_samples: null
  max_val_samples: null
  max_test_samples: null
visualization:
  enabled: true
  save_interval_epochs: 10
  num_samples: 4
  dpi: 150
reporting:
  rebuild_master_tables_after_run: true

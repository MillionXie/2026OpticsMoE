seed: 7
device: auto

experiment:
  family: dataset_switching
  run_name: independent_d2nn_fashionmnist_canvas400_grid220_seed7
  independent_group_id: independent_d2nn_canvas400_grid220_seed7

model:
  type: independent_d2nn
  input_size: 134
  canvas_size: 400
  d2nn_phase_grid_size: 220
  d2nn_num_layers: 5
  target_param_count: 242000
  target_local_phase_param_count: 242000
  include_global_fc: true
  expected_global_fc_param_count: 48400
  expected_total_optical_param_count: 290400
  reference_num_tasks: 3
  moe_reference_optical_params: 1168020

optics:
  wavelength_m: 5.32e-7
  pixel_size_m: 8.0e-6
  evanescent_mode: zero
  phase_param: unconstrained
  expert_phase_init: identity
  expert_init_std: 0.02
  distances_m:
    input_to_prompt: 0.20
    inter_layer: 0.05
    layer5_to_fc: 0.05
    fc_to_detector: 0.05
  global_fc_phase_mode: center_window
  global_fc_phase_size: 220
  global_fc_padding_mode: transparent

detector:
  detector_size: 32
  layout: grid

readout:
  type: optical_only
  normalize_detector_energy: true
  logit_scale: 10.0
  input_norm: layernorm
  norm_affine: false
  hidden_dim: 64
  hidden_layers: 1
  activation: gelu
  dropout: 0.0

regularization:
  phase_dropout:
    enabled: true
    mode: block_phase_bypass
    expert_p: 0.05
    global_fc_p: 0.05
    block_size: 8
    batch_shared: true
    apply_to_experts: true
    apply_to_global_fc: true
    start_epoch: 10

optimizer:
  type: adamw
  lr: 0.003
  weight_decay: 0.0005

training:
  epochs: 100
  print_freq: 50
  max_val_batches: null
  max_test_batches: null
  tasks:
    - name: fashionmnist
      dataset:
        name: fashionmnist
        root: ./data
        input_size: 134
        grayscale: true
        val_split: 0.1
        batch_size: 150
        num_workers: 10
        pin_memory: auto
        persistent_workers: true
        prefetch_factor: 4
        download: true
        smoke_test: false
        smoke_train_size: 64
        smoke_test_size: 32
        max_train_samples: null
        max_val_samples: null
        max_test_samples: null
        sampling_protocol:
          enabled: true
          total_size: 5000
          train_test_ratio: [4, 1]
          class_balanced: true
          seed_offset: 0
      head:
        detector_size: 32
        detector_layout: grid
        readout_type: optical_only
        normalize_detector_energy: true
        logit_scale: 10.0
        input_norm: layernorm
        norm_affine: false
        hidden_dim: 64
        hidden_layers: 1
        activation: gelu
        dropout: 0.0

visualization:
  enabled: true
  save_interval_epochs: 10
  num_samples: 4

reporting:
  rebuild_master_tables_after_run: false  # Rebuild once after parallel runs finish.

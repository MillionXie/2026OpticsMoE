seed: 7
device: auto
experiment:
  family: dataset_switching
  run_name: independent_d2nn_mnist_fashion_emnist_letters_seed7
model:
  type: independent_d2nn
  input_size: 134
  canvas_size: 1000
  d2nn_phase_grid_size: 256
  d2nn_num_layers: 5
  moe_reference_optical_params: null
optics:
  wavelength_m: 5.32e-7
  pixel_size_m: 8.0e-6
  evanescent_mode: zero
  phase_param: unconstrained
  expert_phase_init: identity
  expert_init_std: 0.02
  distances_m:
    input_to_prompt: 0.20
    inter_layer: 0.05
    layer5_to_fc: 0.05
    fc_to_detector: 0.05
detector:
  detector_size: 32
  layout: grid
readout:
  type: mlp
  normalize_detector_energy: true
  input_norm: layernorm
  hidden_dim: 64
  activation: gelu
  dropout: 0.1
optimizer:
  type: adamw
  lr: 0.001
  weight_decay: 0.0005
training:
  epochs: 50
  tasks:
    - name: mnist
      dataset: {name: mnist, root: ./data, input_size: 134, grayscale: true, val_split: 0.1, batch_size: 64, num_workers: 16, download: true, smoke_train_size: 16, smoke_test_size: 8, sampling_protocol: {enabled: false}}
    - name: fashionmnist
      dataset: {name: fashionmnist, root: ./data, input_size: 134, grayscale: true, val_split: 0.1, batch_size: 64, num_workers: 16, download: true, smoke_train_size: 16, smoke_test_size: 8, sampling_protocol: {enabled: false}}
    - name: emnist_letters
      dataset: {name: emnist, split: letters, root: ./data, input_size: 134, grayscale: true, fix_orientation: true, val_split: 0.1, batch_size: 64, num_workers: 16, download: true, smoke_train_size: 16, smoke_test_size: 8, sampling_protocol: {enabled: false}}
reporting:
  rebuild_master_tables_after_run: true

seed: 7
device: auto

experiment:
  family: transfer_adaptation
  run_name: transfer_kmnist_prompt_only_from_mnist_fashion_emnist_seed7
  print_freq: 50

source:
  checkpoint_dir: opticalmoe_experiments/transfer_adaptation/pretrained_backbones/dataset_switching_moe_mnist_fashion_emnist_letters
  checkpoint_name: source_best.pt
  config_name: source_config.yaml
  architecture_report_name: source_architecture_report.json
  expected_source_tasks:
    - mnist
    - fashionmnist
    - emnist_letters

target:
  task_name: kmnist
  dataset:
    name: kmnist
    root: ./data
    input_size: 134
    grayscale: true
    val_split: 0.1
    batch_size: 64
    num_workers: 16
    pin_memory: auto
    persistent_workers: true
    prefetch_factor: 4
    download: true
    smoke_train_size: 64
    smoke_test_size: 32
    sampling_protocol:
      enabled: true
      total_size: 5000
      train_test_ratio: [4, 1]
      class_balanced: true
      seed_offset: 0
    max_train_samples: null
    max_val_samples: null
    max_test_samples: null

transfer:
  method: prompt_only
  init_from_source_prompt: mnist
  train_target_prompt: true
  train_target_readout: false
  freeze_expert_layers: true
  freeze_global_fc: true
  freeze_source_prompts: true
  freeze_source_readouts: true
  freeze_target_readout: true
  allow_extra_trainable_params: false

target_head:
  detector_size: 32
  detector_layout: grid
  readout_type: optical_only
  normalize_detector_energy: true
  logit_scale: 10.0
  input_norm: none
  norm_affine: false
  hidden_dim: 64
  hidden_layers: 0
  activation: relu
  dropout: 0.0

optimizer:
  type: adamw
  lr: 0.01
  weight_decay: 0.0

training:
  epochs: 100
  print_freq: 50
  evaluation:
    max_val_batches: null
    max_test_batches: null

visualization:
  enabled: true
  save_interval_epochs: 10
  num_samples: 4
  dpi: 150

reporting:
  rebuild_master_tables_after_run: true


seed: 7
device: auto
experiment:
  family: dataset_switching
  run_name: dswitch_mnist_fashion_emnist_letters_learnable_E9_seed7
  print_freq: 50
model:
  type: learnable_route_moe
  num_experts: 9
  prompt_type: complex_amplitude
  routing_type: learnable
layout:
  canvas_height: 1000
  canvas_width: 1000
  input_size: 134
  expert_size: 134
  expert_pitch: 200
  padding: 200
  prompt_aperture_size: 600
optics:
  wavelength_m: 5.32e-07
  pixel_size_m: 8.0e-06
  num_layers: 5
  focal_length_m: 0.1
  aperture_mode: hard
  evanescent_mode: zero
  phase_param: unconstrained
  expert_phase_init: identity
  expert_init_std: 0.02
  global_fc_phase_init: identity
  global_fc_init_std: 0.02
  distances_m:
    input_to_prompt: 0.2
    prompt_to_expert: 0.2
    inter_layer: 0.05
    layer5_to_fc: 0.05
    fc_to_detector: 0.05
  global_fc_phase_mode: center_window
  global_fc_phase_size: 600
  global_fc_padding_mode: transparent
prompt:
  mode: complex_order_router
  amplitude_init_logits: 2.0
  train_amplitudes: true
  train_phase_biases: true
  grating_scale: 1.0
  grating_sign_x: 1.0
  grating_sign_y: 1.0
  normalize: sum_amplitude
detector:
  detector_size: 32
  layout: grid
readout:
  type: optical_only
  normalize_detector_energy: true
  logit_scale: 10.0
  input_norm: layernorm
  norm_affine: false
  hidden_dim: 64
  hidden_layers: 1
  activation: gelu
  dropout: 0.1
regularization:
  phase_dropout:
    enabled: true
    mode: block_phase_bypass
    expert_p: 0.05
    global_fc_p: 0.05
    block_size: 8
    batch_shared: true
    apply_to_experts: true
    apply_to_global_fc: false
    start_epoch: 10
optimizer:
  type: adamw
  lr: 0.003
  weight_decay: 0.0005
training:
  mode: dataset_switching
  epochs: 100
  multitask:
    sequential_backward: true
    balanced_sampling: true
    batches_per_update: 1
    loss_reduction: mean
    steps_per_epoch: null
    print_freq: 50
    loss_weights:
      mnist: 1.0
      fashionmnist: 1.0
      emnist_letters: 5.0
    tasks:
    - name: mnist
      dataset:
        name: mnist
        root: ./data
        input_size: 134
        grayscale: true
        val_split: 0.1
        batch_size: 150
        num_workers: 6
        download: true
        smoke_train_size: 64
        smoke_test_size: 32
        sampling_protocol:
          enabled: true
          total_size: 5000
          class_balanced: true
          train_test_ratio:
          - 4
          - 1
          seed_offset: 0
        pin_memory: auto
        persistent_workers: true
        prefetch_factor: 4
        smoke_test: false
        max_train_samples: null
        max_val_samples: null
        max_test_samples: null
      head:
        detector_size: 32
        detector_layout: grid
        readout_type: optical_only
        normalize_detector_energy: true
        logit_scale: 10.0
        input_norm: layernorm
        norm_affine: false
        hidden_dim: 64
        hidden_layers: 1
        activation: gelu
        dropout: 0.1
    - name: fashionmnist
      dataset:
        name: fashionmnist
        root: ./data
        input_size: 134
        grayscale: true
        val_split: 0.1
        batch_size: 150
        num_workers: 6
        download: true
        smoke_train_size: 64
        smoke_test_size: 32
        sampling_protocol:
          enabled: true
          total_size: 5000
          class_balanced: true
          train_test_ratio:
          - 4
          - 1
          seed_offset: 0
        pin_memory: auto
        persistent_workers: true
        prefetch_factor: 4
        smoke_test: false
        max_train_samples: null
        max_val_samples: null
        max_test_samples: null
      head:
        detector_size: 32
        detector_layout: grid
        readout_type: optical_only
        normalize_detector_energy: true
        logit_scale: 10.0
        input_norm: layernorm
        norm_affine: false
        hidden_dim: 64
        hidden_layers: 1
        activation: gelu
        dropout: 0.1
    - name: emnist_letters
      dataset:
        name: emnist
        split: letters
        root: ./data
        input_size: 134
        grayscale: true
        fix_orientation: true
        val_split: 0.1
        batch_size: 150
        num_workers: 6
        download: true
        smoke_train_size: 64
        smoke_test_size: 32
        sampling_protocol:
          enabled: true
          total_size: 13000
          class_balanced: true
          train_test_ratio:
          - 4
          - 1
          seed_offset: 0
        pin_memory: auto
        persistent_workers: true
        prefetch_factor: 4
        smoke_test: false
        max_train_samples: null
        max_val_samples: null
        max_test_samples: null
      head:
        detector_size: 32
        detector_layout: grid
        readout_type: optical_only
        normalize_detector_energy: true
        logit_scale: 10.0
        input_norm: layernorm
        norm_affine: false
        hidden_dim: 64
        hidden_layers: 1
        activation: gelu
        dropout: 0.1
  evaluation:
    max_val_batches: null
    max_test_batches: null
visualization:
  enabled: true
  save_interval_epochs: 10
  num_samples: 4
  dpi: 150
reporting:
  rebuild_master_tables_after_run: true

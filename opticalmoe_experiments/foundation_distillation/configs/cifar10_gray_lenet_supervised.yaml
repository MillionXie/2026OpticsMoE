seed: 7
device: auto

experiment:
  family: foundation_distillation
  variant: lenet_supervised
  run_name: cifar10_gray_lenet_supervised_seed7
  print_freq: 50

dataset:
  name: cifar10
  root: ./data
  input_size: 120
  grayscale: true
  val_split: 0.1
  batch_size: 64
  num_workers: 10
  pin_memory: auto
  persistent_workers: true
  prefetch_factor: 4
  download: true
  smoke_test: false
  smoke_batch_size: 1
  smoke_train_size: 64
  smoke_test_size: 32
  sampling_protocol:
    enabled: true
    total_size: 50000
    train_test_ratio: [4, 1]
    class_balanced: true
    seed_offset: 0
  max_train_samples: null
  max_val_samples: null
  max_test_samples: null

student:
  model_type: supervised_lenet
  feature_dim: 900

lenet:
  input_channels: 1
  channels: [32, 64, 128]
  activation: gelu
  pooling: avg
  adaptive_pool_size: 5
  output_feature_dim: 900
  conv_dropout2d: 0.1
  feature_dropout: 0.2

feature_preprocess:
  norm: layernorm
  norm_affine: true
  activation: gelu

classifier:
  input: lenet_feature
  input_dim: 900
  type: mlp
  hidden_layers: 1
  hidden_dim: 128
  activation: gelu
  dropout: 0.2

optimizer:
  type: adamw
  lr: 0.003
  weight_decay: 0.0005

training:
  epochs: 200
  print_freq: 50
  evaluation:
    max_val_batches: null
    max_test_batches: null

reporting:
  rebuild_master_tables_after_run: true

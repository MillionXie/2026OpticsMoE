seed: 7
device: auto

experiment:
  family: foundation_distillation
  variant: end_to_end_ce_baseline
  run_name: imagenette_gray_end_to_end_moe_seed7
  print_freq: 50

dataset:
  name: imagenette
  root: ./data/imagenette2-160
  input_size: 134
  grayscale: true
  val_split: 0.1
  batch_size: 64
  num_workers: 16
  pin_memory: auto
  persistent_workers: true
  prefetch_factor: 4
  download: false
  smoke_test: false
  smoke_batch_size: 1
  smoke_train_size: 64
  smoke_test_size: 32
  sampling_protocol:
    enabled: false
    total_size: null
    train_test_ratio: [4, 1]
    class_balanced: true
    seed_offset: 0
  max_train_samples: null
  max_val_samples: null
  max_test_samples: null

student:
  model_type: end_to_end_optical_moe
  num_experts: 9

layout:
  canvas_height: 1000
  canvas_width: 1000
  input_size: 134
  expert_size: 134
  expert_pitch: 200
  padding: 200
  prompt_aperture_size: 600

optics:
  wavelength_m: 5.32e-7
  pixel_size_m: 8.0e-6
  num_layers: 5
  focal_length_m: 0.10
  aperture_mode: hard
  evanescent_mode: zero
  phase_param: unconstrained
  expert_phase_init: identity
  expert_init_std: 0.02
  global_fc_phase_init: identity
  global_fc_init_std: 0.02
  global_fc_phase_mode: center_window
  global_fc_phase_size: 600
  global_fc_padding_mode: transparent
  distances_m:
    input_to_prompt: 0.20
    prompt_to_expert: 0.20
    inter_layer: 0.05
    layer5_to_fc: 0.05
    fc_to_detector: 0.05

prompt:
  mode: complex_order_router
  amplitude_init_logits: 2.0
  train_amplitudes: true
  train_phase_biases: true
  grating_scale: 1.0
  grating_sign_x: 1.0
  grating_sign_y: 1.0
  normalize: sum_amplitude

feature_detector:
  type: grid_pool
  grid_size: 16
  pooling: sum
  normalize_total_energy: true
  feature_dim: 256

classifier:
  type: mlp
  hidden_dim: 128
  hidden_layers: 1
  activation: gelu
  dropout: 0.1

loss:
  type: cross_entropy
  ce_weight: 1.0
  feature_distill_weight: 0.0

optimizer:
  type: adamw
  lr: 0.001
  weight_decay: 0.0005

regularization:
  phase_dropout:
    enabled: true
    mode: block_phase_bypass
    expert_p: 0.05
    global_fc_p: 0.0
    block_size: 8
    batch_shared: true
    apply_to_experts: true
    apply_to_global_fc: false
    start_epoch: 10

training:
  epochs: 200
  print_freq: 50
  evaluation:
    max_val_batches: null
    max_test_batches: null

visualization:
  enabled: true
  save_interval_epochs: 10
  num_samples: 4
  dpi: 150

reporting:
  rebuild_master_tables_after_run: true


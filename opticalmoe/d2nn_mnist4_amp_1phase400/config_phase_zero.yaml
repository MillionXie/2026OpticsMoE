seed: 7
device: auto

experiment:
  run_name: d2nn_mnist4_amp_1phase400_sigmoid_zero_seed7
  print_freq: 50

dataset:
  name: mnist4
  root: ./data
  input_size: 400
  class_digits: [0, 1, 2, 3]
  batch_size: 512
  num_workers: 8
  download: true
  use_full_dataset: true

optics:
  wavelength_m: 5.32e-7
  pixel_size_m: 16.0e-6
  canvas_size: 400
  input_size: 400
  phase_mask_size: 400
  phase_mask_mode: full_canvas
  num_layers: 1
  phase_param: sigmoid
  phase_init: zeros
  init_std: 0.02
  evanescent_mode: zero
  input_to_layer_distance_m: 0.03
  inter_layer_distance_m: 0.03
  detector_distance_m: 0.20

detector:
  detector_size: 50
  layout: fixed_2x2
  start_pos_x: 75
  start_pos_y: 75
  N_det_sets: [2, 2]
  det_steps_x: [150, 150]
  det_steps_y: 150
  normalize_detector_energy: true

readout:
  type: detector_only

regularization:
  phase_dropout:
    enabled: false

optimizer:
  type: adamw
  lr: 0.003
  weight_decay: 0.0005

training:
  epochs: 300
  print_freq: 50
  eval_interval_epochs: 1
  save_interval_epochs: 50

visualization:
  enabled: true
  save_interval_epochs: 10
  num_samples: 4
  dpi: 150

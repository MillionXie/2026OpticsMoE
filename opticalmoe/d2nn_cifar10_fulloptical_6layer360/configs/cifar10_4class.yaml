seed: 7
device: auto

experiment:
  run_name: cifar10_4class_fulloptical_6layer360_seed7

dataset:
  name: cifar10_4class
  root: ../../opticalmoe_experiments/data
  class_indices: [0, 1, 2, 3]
  resize_size: 300
  interpolation: bicubic
  antialias: true
  # Dataset-wide per-class caps. null keeps the full selected dataset.
  train_samples_per_class: null
  test_samples_per_class: null
  train_samples_per_class_per_epoch: null
  smoke_train_per_class: 4
  smoke_test_per_class: 2
  # Mini-batch size only; shuffle=True covers every selected train sample once
  # per epoch. This can also be overridden with --batch-size.
  batch_size: 16
  num_workers: 8
  persistent_workers: true
  prefetch_factor: 2
  download: true

optics:
  input_size: 300
  canvas_size: 360
  num_layers: 6
  wavelength_m: 5.32e-7
  pixel_size_m: 16.0e-6
  phase_param: sigmoid
  phase_init: zeros
  phase_init_std: 0.02
  input_to_layer_distance_m: 0.0
  inter_layer_distance_m: 0.05
  detector_distance_m: 0.10
  evanescent_mode: zero
  # Optional angular cutoff: set true and choose theta_max_deg to enable.
  k_space_constraint_enabled: false
  theta_max_deg: 1.0

detector:
  # Compact centered 2x2 layout in the 360x360 detector plane.
  detector_size: 40
  layout: fixed_2x2
  start_pos_x: 100
  start_pos_y: 100
  N_det_sets: [2, 2]
  det_steps_x: [80, 80]
  det_steps_y: 80
  normalize_detector_energy: true

loss:
  type: detector_plane_mse
  scale: 100.0
  normalize_detector_plane_mse: true
  detector_plane_mse_normalization_eps: 1.0e-8

regularization:
  phase_dropout:
    enabled: false
    mode: none
    p: 0.0
    block_size: 8
    batch_shared: true
    start_epoch: 0

optimizer:
  type: adamw
  lr: 0.01
  weight_decay: 0.0

training:
  epochs: 100
  print_freq: 1000

visualization:
  enabled: true
  save_interval_epochs: 10
  num_samples: 4

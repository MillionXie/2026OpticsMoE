_base_: cifar10_4class.yaml

experiment:
  run_name: cifar10_4class_fulloptical_6layer360_optoelectronic_interlayers_20cm_seed7

optics:
  input_to_layer_distance_m: 0.0
  inter_layer_distance_m: 0.20
  detector_distance_m: 0.20

optoelectronic_interlayers:
  enabled: true
  detection: square_law
  normalization: layer_norm
  normalization_scope: spatial_per_sample
  affine: false
  nonlinearity: relu
  reload_as: amplitude
  eps: 1.0e-5

optimizer:
  type: adamw
  lr: 0.005
  weight_decay: 0.0

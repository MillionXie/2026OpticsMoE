# Separate three-task experiment: MNIST + FashionMNIST + EMNIST letters.
#
# Run with:
# python scripts/train_four_expert_multitask_moe.py --config configs/four_expert_moe_multitask_mnist_fashion_emnist.yaml --run_name four_expert_multitask_mnist_fashion_emnist
#
# Important:
# The optical backbone is shared, but each task has its own detector/readout
# head. MNIST/FashionMNIST are 10-class tasks; EMNIST letters is 26-class.

seed: 7
device: auto

experiment:
  run_name: four_expert_multitask_mnist_fashion_emnist
  print_freq: 50

layout:
  canvas_height: 700
  canvas_width: 700
  input_size: 200
  expert_size: 200
  prompt_cell_size: 300
  gap_pixels: 100
  outer_margin: 100

optics:
  wavelength_m: 5.32e-7
  pixel_size_m: 8.0e-6
  num_layers: 5
  focal_length_m: 0.10
  aperture_mode: hard
  evanescent_mode: zero
  phase_param: unconstrained
  expert_phase_init: uniform_0_2pi
  expert_init_std: 0.02
  global_fc_phase_init: identity
  global_fc_init_std: 0.02
  distances_m:
    input_to_prompt: 0.20
    prompt_to_expert: 0.20
    inter_layer: 0.05
    layer5_to_fc: 0.05
    fc_to_detector: 0.05

prompt:
  amplitude_init_logits: 2.0
  train_phase_biases: true

detector:
  detector_size: 32
  layout: grid

readout:
  # 全局默认读出头配置。每个 task 的 head 可以覆盖这些值。
  #
  # type:
  #   optical_only = 不加可训练电子层，直接把 detector energy 当 logits
  #   linear       = detector energy -> 线性层 -> logits
  #   mlp          = detector energy -> MLP 非线性电子读出 -> logits
  type: mlp
  # 是否先把 detector energy 除以 CCD 总能量。通常建议 true。
  normalize_detector_energy: true
  # optical_only 模式下的 logits 放大系数。linear/mlp 模式主要由电子层自己学习尺度。
  logit_scale: 10.0
  # input_norm:
  #   none      = 不做电子归一化
  #   layernorm = 对 detector energy 做 LayerNorm，有助于不同任务/类别数的尺度稳定
  input_norm: layernorm
  # LayerNorm 是否带可训练 affine 参数。true 会增加少量电子参数。
  norm_affine: true
  # MLP 隐藏层宽度，仅 type=mlp 时生效。
  hidden_dim: 64
  # MLP 隐藏层数量，仅 type=mlp 时生效。
  hidden_layers: 1
  # 非线性激活：relu / gelu / tanh / silu。
  activation: relu
  # MLP dropout，仅 type=mlp 时生效。光学小数据实验一般先用 0。
  dropout: 0.0

optimizer:
  type: adamw
  lr: 0.001
  weight_decay: 0.0

loss:
  type: cross_entropy

training:
  mode: multitask
  epochs: 300
  multitask:
    tasks:
      - name: mnist
        dataset:
          name: mnist
          root: ./data
          input_size: 200
          val_split: 0.1
          batch_size: 128
          num_workers: 0
          download: true
          smoke_test: false
          smoke_train_size: 12
          smoke_test_size: 8
          sampling_protocol:
            enabled: true
            total_size: 5000
            train_test_ratio: [4, 1]
        head:
          detector_size: 32
          detector_layout: grid
          # MNIST 当前较容易，先保留纯 detector energy 读出。
          readout_type: mlp #optical_only
          normalize_detector_energy: true
          logit_scale: 10.0
          input_norm: layernorm #none
          hidden_dim: 32 #64
          hidden_layers: 1
          activation: relu
          dropout: 0.2
      - name: fashionmnist
        dataset:
          name: fashionmnist
          root: ./data
          input_size: 200
          val_split: 0.1
          batch_size: 128
          num_workers: 0
          download: true
          smoke_test: false
          smoke_train_size: 12
          smoke_test_size: 8
          sampling_protocol:
            enabled: true
            total_size: 5000
            train_test_ratio: [4, 1]
        head:
          detector_size: 32
          detector_layout: grid
          # FashionMNIST 当前也能学习，先保留纯 detector energy 读出。
          readout_type: mlp #optical_only
          normalize_detector_energy: true
          logit_scale: 10.0
          input_norm: layernorm #none
          hidden_dim: 32 #64
          hidden_layers: 1
          activation: relu
          dropout: 0.2
      - name: emnist
        dataset:
          name: emnist
          # 26-class English-letter task. The dataloader remaps labels 1..26
          # to 0..25 for CrossEntropyLoss.
          split: letters
          fix_orientation: true
          root: ./data
          input_size: 200
          val_split: 0.1
          batch_size: 128
          num_workers: 0
          download: true
          smoke_test: false
          smoke_train_size: 12
          smoke_test_size: 8
          sampling_protocol:
            enabled: true
            total_size: 13000
            train_test_ratio: [4, 1]
        head:
          detector_size: 32
          detector_layout: grid
          # EMNIST letters 是 26 类，纯 optical_only 很容易卡在随机水平。
          # 推荐先用 mlp + layernorm 作为“电子后处理增强版”。
          #
          # 如果你要做纯光学对照实验，把下面两项改为：
          #   readout_type: optical_only
          #   input_norm: none
          readout_type: mlp
          normalize_detector_energy: true
          logit_scale: 10.0
          input_norm: layernorm
          norm_affine: true
          hidden_dim: 64 #128
          hidden_layers: 1 #2
          activation: gelu
          dropout: 0.2
    loss_reduction: mean
    # 多任务 loss 权重。一次 update 会分别跑 MNIST/Fashion/EMNIST，
    # 然后用这些权重合成一个总 loss 再反传一次：
    #   total_loss = sum(weight_task * loss_task) / sum(weight_task)
    #
    # EMNIST letters 是 26 类，且当前明显学得更弱，所以这里默认给
    # 更高权重。想回到完全等权，把 emnist 改成 1.0。
    loss_weights:
      mnist: 1.0
      fashionmnist: 1.0
      emnist: 5.0
    batches_per_update: 1
    balanced_sampling: true
    # With the paper-style sampling protocol, the natural epoch is now based
    # on the selected 2000/2000/5200 samples rather than the full datasets.
    # Keep null for a literal selected-set epoch; set a value such as 500 or
    # 1000 for a fixed update budget.
    steps_per_epoch: null
    print_freq: 50
  evaluation:
    # Keep null for full validation/test metrics. For faster exploratory runs,
    # use values such as 100 and 500.
    max_val_batches: null
    max_test_batches: null
  progressive:
    enabled: true
    order: backward
    stage_epochs: [20, 20, 20, 20, 20, 200]
    train_task_prompts_always: true
    train_global_fc_always: true

visualization:
  enabled: true
  save_interval_epochs: 5
  num_samples: 2
  font_size: 12
  dpi: 150

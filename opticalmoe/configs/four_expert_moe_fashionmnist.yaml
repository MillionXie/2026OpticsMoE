seed: 7
device: auto

experiment:
  run_name: four_expert_moe_fashionmnist

dataset:
  name: fashionmnist
  root: ./data
  input_size: 200
  val_split: 0.2
  batch_size: 32
  num_workers: 0
  download: true
  smoke_test: false
  smoke_train_size: 12
  smoke_test_size: 8

layout:
  canvas_height: 700
  canvas_width: 700
  input_size: 200
  expert_size: 200
  prompt_cell_size: 300
  gap_pixels: 100
  outer_margin: 100

optics:
  wavelength_m: 5.32e-7
  pixel_size_m: 8.0e-6
  focal_length_m: 0.10
  num_layers: 5
  aperture_mode: hard
  phase_param: unconstrained
  expert_phase_init: uniform_0_2pi
  expert_init_std: 0.02
  global_fc_phase_init: identity
  global_fc_init_std: 0.02
  evanescent_mode: zero
  distances_m:
    input_to_prompt: 0.20
    prompt_to_expert: 0.20
    inter_layer: 0.05
    layer5_to_fc: 0.05
    fc_to_detector: 0.05

prompt:
  amplitude_init_logits: 2.0
  train_phase_biases: true

detector:
  detector_size: 32
  layout: grid

readout:
  type: optical_only
  normalize_detector_energy: true
  logit_scale: 10.0
  hidden_dim: 64
  activation: relu

optimizer:
  type: adamw
  lr: 0.003
  weight_decay: 0.0

training:
  mode: single
  epochs: 100
  progressive:
    enabled: true
    order: backward
    stage_epochs: [5, 5, 5, 5, 10, 70]
    train_prompt_always: true
    train_global_fc_always: true

loss:
  lambda_prompt_balance: 0.0
  lambda_outside_energy: 0.0
  lambda_expert_energy_entropy: 0.0

visualization:
  enabled: true
  save_interval_epochs: 5
  num_samples: 2
  font_size: 12
  dpi: 150

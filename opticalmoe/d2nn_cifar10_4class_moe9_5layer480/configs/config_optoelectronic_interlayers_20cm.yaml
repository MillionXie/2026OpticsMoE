_base_: config_importance_adamw.yaml

experiment:
  run_name: cifar10_4class_moe9x5_top3_globalfc_perexpert_affine_oeo_20cm_seed7

optics:
  distances_m:
    # Keep the calibrated prompt fan-out geometry unchanged. The five expert
    # phase planes and the global phase plane form the six-plane comparison.
    input_to_prompt: 0.1444
    prompt_to_expert: 0.1444
    inter_layer: 0.20
    last_expert_to_global_fc: 0.20
    global_fc_to_detector: 0.20

optoelectronic_interlayers:
  enabled: true
  detection: square_law
  normalization: layer_norm
  normalization_scope: per_expert
  per_expert_enabled: true
  elementwise_affine: true
  affine_sharing: per_expert
  nonlinearity: relu
  reload_as: amplitude
  reapply_routing_amplitude: false
  eps: 1.0e-5


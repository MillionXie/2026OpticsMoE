seed: 7
device: auto

experiment:
  run_name: cifar10_4class_heterogeneous_moe9_deep_nonlinear_layernorm_relu_normmse_top3_seed7

dataset:
  name: cifar10_4class
  root: ../../opticalmoe_experiments/data
  class_indices: [0, 1, 2, 3]
  image_size: 100
  input_size: 120
  resize_interpolation: bicubic
  resize_antialias: true
  train_samples_per_class: null
  test_samples_per_class: null
  train_samples_per_class_per_epoch: null
  smoke_train_per_class: 4
  smoke_test_per_class: 2
  batch_size: 16
  num_workers: 8
  persistent_workers: true
  prefetch_factor: 2
  download: true

model:
  type: heterogeneous_optical_moe9_deep_nonlinear
  canvas_size: 480
  active_size: 450
  image_size: 100
  input_size: 120
  num_experts: 9
  expert_size: 120
  expert_pitch: 150

optics:
  wavelength_m: 5.32e-7
  pixel_size_m: 16.0e-6
  phase_param: sigmoid
  phase_init: zeros
  init_std: 0.02
  evanescent_mode: zero
  k_space_constraint_enabled: false
  theta_max_deg: 1.0
  prompt_focal_length_m: 0.0722
  distances_m:
    input_to_prompt: 0.1444
    prompt_to_expert: 0.1444
    # Stage5's local 0.05 m propagation terminates at the global-phase plane.
    expert_to_global_fc: 0.0
    global_fc_to_detector: 0.10

prompt:
  type: region_amplitude_global_lens
  mode: region_amplitude_global_lens
  random_phase_enabled: false
  train_phase_biases: false
  routing_type: input_topk
  top_k: 3
  temperature: 1.0
  router_pool_size: 10
  grating_sign_x: 1.0
  grating_sign_y: 1.0
  min_grating_period_pixels: 0.0
  enforce_global_convolution_geometry: true
  convolution_relative_tolerance: 0.02

expert_bank:
  assignments: [d2nn, fourier, fiber, fiber, d2nn, fourier, fourier, fiber, d2nn]
  output_scalar:
    # Disable the redundant per-expert amplitude gain. The router remains the
    # input-dependent expert amplitude controller.
    gain_enabled: false
    gain_min: 0.0
    gain_max: 2.0
    gain_init: 1.0
    phase_bias_enabled: true
    phase_bias_init_rad: 0.0
  d2nn:
    num_layers: 5
    nonlinear_schedule: [true, true, true, true, true]
    inter_layer_distance_m: 0.05
    propagation_padding: 30
    phase_param: sigmoid
    phase_init: zeros
    phase_init_std: 0.02
  fourier:
    num_conv_blocks: 3
    num_tail_spatial_layers: 2
    nonlinear_schedule: [true, true, true, true, true]
    inter_block_distance_m: 0.05
    tail_spatial_distance_m: 0.05
    propagation_padding: 30
    phase_only: true
    phase_param: sigmoid
    phase_init: zeros
    phase_init_std: 0.02
  fiber:
    num_pre_d2nn_layers: 2
    num_post_d2nn_layers: 2
    # Stage2 is the second encoder propagation and must remain complex so its
    # phase enters the Gaussian-mode projection in Stage3 without OEO.
    nonlinear_schedule: [true, false, true, true, true]
    inter_layer_distance_m: 0.05
    propagation_padding: 30
    phase_param: sigmoid
    phase_init: zeros
    phase_init_std: 0.02
    fibers_per_axis: 10
    mode_sigma_px: 3.0
    mode_center_margin_px: 6.0
    trainable_mode_phase: true
    trainable_mode_amplitude: true
    mode_bank_trainable: false
    amplitude_min: 0.0
    amplitude_max: 1.0
    amplitude_init: 0.95

nonlinearity:
  enabled: true
  type: intensity_layernorm_relu
  normalization:
    # Per sample and per stage: one mean/std over all OEO-enabled expert pixels.
    # No statistics cross the batch dimension and no expert is normalized alone.
    type: stage_global_layernorm
    aperture: nonlinear_enabled_expert_regions
    eps: 1.0e-6
    elementwise_affine: false
  activation:
    type: relu
  reencoding:
    amplitude_source: relu_output
    zero_phase: true

global_fc:
  enabled: true
  phase_size: 450

detector:
  detector_size: 50
  layout: fixed_2x2
  start_pos_x: 115
  start_pos_y: 115
  N_det_sets: [2, 2]
  det_steps_x: [150, 150]
  det_steps_y: 150
  normalize_detector_energy: true

readout:
  type: detector_only

loss:
  type: detector_plane_mse
  scale: 100.0
  # true: rescale each predicted plane to the target mask's total energy before
  # computing the full-plane MSE. false: reproduce the original raw-plane MSE.
  normalize_detector_plane_mse: true
  detector_plane_mse_normalization_eps: 1.0e-8
  detector_ce_weight: 0.0
  router_balance_weight: 0.1
  router_importance_weight: 0.0

regularization:
  phase_dropout:
    enabled: false
    mode: none
    p: 0.0
    block_size: 8
    batch_shared: true
    start_epoch: 0

optimizer:
  type: adamw
  lr: 0.008
  weight_decay: 0.0

training:
  epochs: 200
  print_freq: 5000

visualization:
  enabled: true
  save_interval_epochs: 10
  num_samples: 4

slm_export:
  enabled: true
  slm_width: 1920
  slm_height: 1200
  source_pixel_size_um: 16.0
  slm_pixel_size_um: 8.0
  scale_factor: 2

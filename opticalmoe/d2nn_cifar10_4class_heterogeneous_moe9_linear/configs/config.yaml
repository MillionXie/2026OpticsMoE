seed: 7
device: auto

experiment:
  run_name: cifar10_4class_heterogeneous_moe9_linear_top3_seed7

dataset:
  name: cifar10_4class
  root: ../../opticalmoe_experiments/data
  class_indices: [0, 1, 2, 3]
  image_size: 100
  input_size: 120
  resize_interpolation: bicubic
  resize_antialias: true
  train_samples_per_class: null
  test_samples_per_class: null
  train_samples_per_class_per_epoch: null
  smoke_train_per_class: 4
  smoke_test_per_class: 2
  batch_size: 16
  num_workers: 8
  persistent_workers: true
  prefetch_factor: 2
  download: true

model:
  type: heterogeneous_optical_moe9_linear
  canvas_size: 480
  active_size: 450
  image_size: 100
  input_size: 120
  num_experts: 9
  expert_size: 120
  expert_pitch: 150

optics:
  wavelength_m: 5.32e-7
  pixel_size_m: 16.0e-6
  phase_param: sigmoid
  phase_init: zeros
  init_std: 0.02
  evanescent_mode: zero
  k_space_constraint_enabled: false
  theta_max_deg: 1.0
  prompt_focal_length_m: 0.0722
  distances_m:
    input_to_prompt: 0.1444
    prompt_to_expert: 0.1444
    expert_to_global_fc: 0.05
    global_fc_to_detector: 0.10

prompt:
  type: region_amplitude_global_lens
  mode: region_amplitude_global_lens
  random_phase_enabled: false
  train_phase_biases: false
  routing_type: input_topk
  top_k: 3
  temperature: 1.0
  router_pool_size: 10
  grating_sign_x: 1.0
  grating_sign_y: 1.0
  min_grating_period_pixels: 0.0
  enforce_global_convolution_geometry: true
  convolution_relative_tolerance: 0.02

# Row-major map:
# D2NN    Fourier  Fiber
# Fiber   D2NN     Fourier
# Fourier Fiber    D2NN
experts:
  types: [d2nn, fourier, fiber, fiber, d2nn, fourier, fourier, fiber, d2nn]
  output_scalar:
    gain_enabled: true
    gain_min: 0.0
    gain_max: 2.0
    gain_init: 1.0
    phase_bias_enabled: true
    phase_bias_init_rad: 0.0
  d2nn:
    num_layers: 5
    inter_layer_distance_m: 0.05
    # Each local 120x120 field is zero-padded to 180x180 for propagation and
    # centre-cropped afterwards, reducing local FFT periodic-boundary effects.
    propagation_padding: 30
    phase_param: sigmoid
    phase_init: zeros
    phase_init_std: 0.02
  fourier:
    phase_init: zeros
    phase_init_std: 0.02
  fiber:
    mode_grid: [10, 10]
    mode_sigma_pixels: 4.0
    mode_center_margin_pixels: 6.0
    amplitude_min: 0.0
    amplitude_max: 1.0
    amplitude_init: 0.95

global_fc:
  enabled: true
  phase_size: 450

detector:
  detector_size: 50
  layout: fixed_2x2
  start_pos_x: 115
  start_pos_y: 115
  N_det_sets: [2, 2]
  det_steps_x: [150, 150]
  det_steps_y: 150
  normalize_detector_energy: true

readout:
  type: detector_only

loss:
  type: detector_plane_mse
  scale: 100.0
  normalize_detector_plane_mse: true
  detector_plane_mse_normalization_eps: 1.0e-8
  router_balance_weight: 0.1
  router_importance_weight: 0.0

regularization:
  phase_dropout:
    enabled: false
    mode: none
    p: 0.0
    block_size: 8
    batch_shared: true
    start_epoch: 0

optimizer:
  type: adamw
  lr: 0.008
  weight_decay: 0.0

training:
  epochs: 200
  print_freq: 1300

visualization:
  enabled: true
  save_interval_epochs: 10
  num_samples: 4

slm_export:
  enabled: true
  slm_width: 1920
  slm_height: 1200
  source_pixel_size_um: 16.0
  slm_pixel_size_um: 8.0
  scale_factor: 2

